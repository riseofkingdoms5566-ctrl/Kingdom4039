<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom 4039 | Rise of Kingdoms</title>
    <style>
        /* Genel Tasarım */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f1a;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Başlık Alanı */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 20px;
            border-bottom: 3px solid #e94560;
        }

        h1 { margin: 0; font-size: 2.5em; color: #e94560; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #a2a2ba; }

        /* Ana Konteyner */
        .container { padding: 20px; max-width: 800px; margin: auto; }

        /* Hızlı Menü Butonları */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #e94560;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover { background: #b0334a; transform: translateY(-3px); }

        /* Klan Kartları */
        .clan-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .clan-card {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30475e;
            transition: 0.3s;
        }

        .clan-card:hover { border-color: #e94560; background: #1a2a4a; }

        .clan-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #e94560;
            margin-bottom: 15px;
        }

        .tag {
            background: #e94560;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }

        footer { margin-top: 50px; padding: 20px; color: #444; font-size: 0.9em; }
    </style>
</head>
<body>

<header>
    <h1>KINGDOM #4039</h1>
    <p>Official Kingdom Management & Information Center</p>
</header>

<div class="container">
    
    <div class="nav-menu">
        <a href="index.html" class="nav-btn">Ana Sayfa</a>
        <a href="hakkimizda.html" class="nav-btn">Krallık Bilgileri</a>
        <a href="#" class="nav-btn">KvK Durumu</a> </div>

    <h2>Ana İttifaklar</h2>
    <div class="clan-section">
        
        <div class="clan-card">
            <img src="https://i.ibb.co/LzNfD9V/rok-infantry.png" alt="NM39" class="clan-img">
            <h3>NO MERCY <span class="tag">NM39</span></h3>
            <p>Main Fighting Alliance of K4039</p>
        </div>

        <div class="clan-card">
            <img src="https://i.ibb.co/pX8z9vF/rok-cavalry.png" alt="NB39" class="clan-img">
            <h3>NO BAGUETTE <span class="tag">NB39</span></h3>
            <p>Secondary Support & Rally Force</p>
        </div>

    </div>

</div>

<footer>
    &copy; 2026 Kingdom 4039 Dashboard | Created for RoK
</footer>

</body>
</html>
