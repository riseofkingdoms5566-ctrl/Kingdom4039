<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Kingdom 4039 | Rise of Kingdoms Resmi Paneli</title>
    <meta name="description" content="Kingdom #4039 resmi krallık sitesi. Güncel klan duyuruları, KvK hazırlıkları, NM39 ve NB39 ittifak bilgileri ve krallık yönetimi.">
    <meta name="keywords" content="Rise of Kingdoms, RoK, Kingdom 4039, K4039, No Mercy, No Baguette, KvK">
    <meta name="author" content="Osman Mamedov">

    <meta property="og:title" content="Kingdom 4039 | RoK Dashboard">
    <meta property="og:description" content="Krallık #4039 için hazırlanan resmi bilgilendirme sayfası.">
    <meta property="og:image" content="https://i.ibb.co/LzNfD9V/rok-infantry.png">
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/LzNfD9V/rok-infantry.png">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f1a;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 20px;
            border-bottom: 3px solid #e94560;
        }

        h1 { margin: 0; font-size: 2.2em; color: #e94560; text-transform: uppercase; letter-spacing: 2px; }
        .sub-text { color: #a2a2ba; margin-top: 10px; font-size: 0.9em; }

        .container { padding: 20px; max-width: 800px; margin: auto; }

        /* ANA MENÜ BUTONLARI */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #e94560;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .nav-btn:hover { background: #b0334a; transform: translateY(-3px); }

        /* KLAN KARTLARI */
        .clan-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .clan-card {
            background: #16213e;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #30475e;
            transition: 0.3s;
        }

        .clan-card:hover { border-color: #e94560; transform: scale(1.02); }

        .clan-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #e94560;
            margin-bottom: 15px;
        }

        .tag {
            background: #e94560;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
        }

        footer { margin-top: 50px; padding: 20px; color: #444; font-size: 0.8em; border-top: 1px solid #1a1a2e; }
    </style>
</head>
<body>

<header>
    <h1>KINGDOM #4039</h1>
    <p class="sub-text">Official Kingdom Management & Information Center</p>
</header>

<div class="container">
    
    <div class="nav-menu">
        <a href="index.html" class="nav-btn">Ana Sayfa</a>
        <a href="hakkimizda.html" class="nav-btn">📢 Duyurular</a>
    </div>

    <h2 style="margin-top: 40px; color: #a2a2ba;">Ana İttifaklar</h2>
    <div class="clan-section">
        
        <div class="clan-card">
            <img src="https://i.ibb.co/LzNfD9V/rok-infantry.png" alt="NM39" class="clan-img">
            <h3>NO MERCY <span class="tag">NM39</span></h3>
            <p style="color: #8b8b9a;">Krallık #4039 Ana Savaşçı Birliği.</p>
        </div>

        <div class="clan-card">
            <img src="https://i.ibb.co/pX8z9vF/rok-cavalry.png" alt="NB39" class="clan-img">
            <h3>NO BAGUETTE <span class="tag">NB39</span></h3>
            <p style="color: #8b8b9a;">Destek ve Ana Vuruş Gücü.</p>
        </div>

    </div>

</div>

<footer>
    &copy; 2026 Kingdom 4039 Dashboard | Created by Osman Mamedov
</footer>

</body>
</html>
